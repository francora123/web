<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Georgia', serif; color: #f4e4bc; }
    #game-container { position: relative; width: 100vw; height: 100dvh; display: flex; justify-content: center; align-items: center; }
    
    /* El texto oculto tras el humo */
    #texto-carta {
        width: 80%;
        text-align: center;
        line-height: 1.8;
        font-size: 1.2rem;
        opacity: 0.1;
        transition: opacity 0.5s;
        z-index: 1;
    }

    /* Capa de humo/oscuridad */
    #overlay {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at var(--x) var(--y), transparent 10%, rgba(0,0,0,0.95) 25%);
        z-index: 2;
        pointer-events: none;
    }

    #instrucciones {
        position: fixed;
        top: 20px;
        width: 100%;
        text-align: center;
        font-style: italic;
        color: #888;
        z-index: 3;
    }

    .active #texto-carta { opacity: 1; }
</style>
</head>
<body>

<div id="instrucciones">Mantén presionado para ver el mensaje y disipar el humo...</div>

<div id="game-container">
    <div id="texto-carta"></div>
    <div id="overlay" style="--x: 50%; --y: 50%;"></div>
</div>

<script>
const carta = "Sé que la cagué... [Tu mensaje completo aquí] ...fui yo quien lo quemó.";
const contenedor = document.getElementById('texto-carta');
const overlay = document.getElementById('overlay');
const body = document.body;
let index = 0;
let isPressing = false;

// Actualizar posición del "foco"
const updateSpotlight = (e) => {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    overlay.style.setProperty('--x', `${x}px`);
    overlay.style.setProperty('--y', `${y}px`);
};

// Escribir mientras presiona
function type() {
    if (isPressing && index < carta.length) {
        contenedor.innerHTML += carta[index];
        index++;
        setTimeout(type, 50);
    }
}

const start = (e) => {
    isPressing = true;
    body.classList.add('active');
    updateSpotlight(e);
    type();
};

const stop = () => {
    isPressing = false;
    body.classList.remove('active');
};

window.addEventListener('mousedown', start);
window.addEventListener('touchstart', start);
window.addEventListener('mouseup', stop);
window.addEventListener('touchend', stop);
window.addEventListener('mousemove', updateSpotlight);
window.addEventListener('touchmove', updateSpotlight);

</script>
</body>
</html>
