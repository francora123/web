
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Para ti</title>
<style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Georgia', serif; color: #f4e4bc; }
    
    /* Pantalla de Bloqueo */
    #lock-screen {
        position: fixed; inset: 0; background: #000; z-index: 1000;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        transition: opacity 1s;
    }
    input { 
        background: transparent; border: none; border-bottom: 1px solid #333; 
        color: #f4e4bc; text-align: center; font-size: 1.2rem; outline: none; padding: 10px;
        font-family: 'Georgia', serif;
    }

    /* Contenedor principal */
    #game-container { 
        position: relative; 
        width: 100vw; 
        height: 100dvh; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        opacity: 0; 
        transition: 1s; 
    }
    
    /* Área de texto con scroll interno invisible */
    #scroll-wrapper {
        width: 80%;
        max-height: 70vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        scrollbar-width: none; /* Firefox */
    }
    #scroll-wrapper::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    #texto-carta { 
        text-align: center; 
        line-height: 1.8; 
        font-size: 1.15rem; 
        opacity: 0.1; 
        transition: opacity 0.5s; 
        z-index: 1; 
        white-space: pre-line;
        padding-bottom: 50px;
    }

    #overlay { 
        position: absolute; 
        inset: 0; 
        background: radial-gradient(circle at var(--x) var(--y), transparent 8%, rgba(0,0,0,0.98) 22%); 
        z-index: 2; 
        pointer-events: none; 
    }

    #instrucciones { 
        position: fixed; 
        top: 30px; 
        width: 100%; 
        text-align: center; 
        font-style: italic; 
        color: #444; 
        z-index: 3; 
        opacity: 0; 
        transition: opacity 1s;
    }

    .active #texto-carta { opacity: 1; }
    .unlocked #game-container, .unlocked #instrucciones { opacity: 1; }
</style>
</head>
<body>

<div id="lock-screen">
    <input type="password" id="pass" placeholder="Contraseña..." autofocus>
</div>

<div id="instrucciones">Mantén presionado para ver...</div>

<div id="game-container">
    <div id="scroll-wrapper">
        <div id="texto-carta"></div>
    </div>
    <div id="overlay" style="--x: 50%; --y: 50%;"></div>
</div>

<script>
const CLAVE = "miaw"; 
const carta = `Se que la cague y es la parte mas dificil, la de no poder echarle la culpa a nadie más que a mi mismo, tuve algo real en mis manos algo que no se encuentra facil y lo rompi y no era porque no te quisiera sino porque no supe manejar lo que me pasaba por dentro, el miedo la inseguridad… ese enfado que a veces tenia y ni siquiera entendia de donde venia, lo peor es que tu eras justo lo que necesitaba tu forma de ver la vida tu calma tu humor esa manera tuya de hacer que todo fuera mas sencillo sin darte cuenta, contigo me sentia bien… aunque muchas veces fui incapaz de demostartelo o de cuidarlo como debia.

No siempre el amor es suficiente cuando uno no esta bien consigo mismo y yo no lo estaba… y la verdad es que todavia estoy intentando estarlo. Hoy me pesa saber que eras mi lugar seguro y que fui yo quien lo quemo y duele de una forma que no se ni como explicar bien, saber que eras todo lo que queria y aun asi convertirme en mi propio peor enemigo.`;

const passInput = document.getElementById('pass');
const lockScreen = document.getElementById('lock-screen');
const contenedor = document.getElementById('texto-carta');
const scrollWrapper = document.getElementById('scroll-wrapper');
const overlay = document.getElementById('overlay');
let index = 0;
let isPressing = false;
let accessGranted = false;

passInput.addEventListener('input', (e) => {
    if(e.target.value.toLowerCase() === CLAVE) {
        accessGranted = true;
        lockScreen.style.opacity = "0";
        document.body.classList.add('unlocked');
        setTimeout(() => {
            lockScreen.remove();
            passInput.blur();
        }, 1000);
    }
});

const updateSpotlight = (e) => {
    if(!accessGranted) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    overlay.style.setProperty('--x', `${x}px`);
    overlay.style.setProperty('--y', `${y}px`);
};

function type() {
    if (isPressing && index < carta.length) {
        contenedor.innerHTML += carta[index];
        index++;
        // Auto-scroll hacia abajo mientras escribe
        scrollWrapper.scrollTop = scrollWrapper.scrollHeight;
        setTimeout(type, 40);
    }
}

const start = (e) => {
    if(!accessGranted) return;
    isPressing = true;
    document.body.classList.add('active');
    updateSpotlight(e);
    type();
};

const stop = () => {
    isPressing = false;
    document.body.classList.remove('active');
};

window.addEventListener('mousedown', start);
window.addEventListener('touchstart', start);
window.addEventListener('mouseup', stop);
window.addEventListener('touchend', stop);
window.addEventListener('mousemove', updateSpotlight);
window.addEventListener('touchmove', updateSpotlight);
</script>
</body>
</html>
