<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para ti</title>
<style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;height:100dvh;display:flex;justify-content:center;align-items:center;background:#000;overflow:hidden;font-family:Georgia,serif;}

    /* CONTENEDOR CARTA */
    .viewport{
        position:relative;
        width:88vw;
        height:78dvh;
        background:#f4e4bc;
        overflow:hidden;
        box-shadow:0 0 80px rgba(0,0,0,.9);
    }

    /* TEXTO */
    #texto{
        position:absolute;
        top:0;
        width:100%;
        padding:40px 26px;
        color:#2c1b18;
        font-size:1.1rem;
        line-height:1.75;
        white-space:pre-line;
        transform: translateY(0);
        transition: transform 0.2s linear; /* Suaviza el movimiento al subir */
    }

    /* FUEGO */
    .fuego{
        position:absolute;
        bottom:0;
        width:100%;
        height:16px;
        background:linear-gradient(to top,#ff3b00,#ff9a00,transparent);
        box-shadow:0 -10px 30px #ff3b00, 0 -25px 70px #ff0000;
        z-index: 10;
    }

    /* CARBÓN */
    .carbon{
        position:absolute;
        bottom:0;
        width:100%;
        height:100%;
        background:#000;
        transform:translateY(100%);
        z-index: 5;
    }

    /* FINAL */
    #final{
        position:fixed;
        width:85%;
        text-align:center;
        color:rgba(244,228,188,.8);
        font-style:italic;
        opacity:0;
        z-index: 20;
    }

    @keyframes showFinal{
        to{opacity:1;}
    }

    /* CENIZAS */
    .ceniza{position:absolute;background:#fff;border-radius:50%;opacity:.2;animation:fall linear infinite;pointer-events:none;}
    @keyframes fall{0%{transform:translateY(100vh);opacity:0;} 20%{opacity:.3;} 100%{transform:translateY(-20vh) translateX(40px);opacity:0;}}

    /* BOTÓN INICIO */
    #start{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000;color:#f4e4bc;z-index:999;cursor:pointer;}
</style>
</head>
<body>

<div id="start">toca para leer</div>

<div class="viewport">
    <div id="texto"></div>
    <div class="fuego"></div>
    <div class="carbon"></div>
</div>

<div id="final">No entres en pánico… esto solo lo puedes ver tú. me aburria en el aeropuerto🥴</div>

<script>
const text = `Se que la cague y es la parte mas dificil, la de no poder echarle la culpa a nadie más que a mi mismo, tuve algo real en mis manos algo que no se encuentra facil y lo rompi y no era porque no te quisiera sino porque no supe manejar lo que me pasaba por dentro, el miedo la inseguridad… ese enfado que a veces tenia y ni siquiera entendia de donde venia, lo peor es que tu eras justo lo que necesitaba tu forma de ver la vida tu calma tu humor esa manera tuya de hacer que todo fuera mas sencillo sin darte cuenta, contigo me sentia bien… aunque muchas veces fui incapaz de demostartelo o de cuidarlo como debia.

No siempre el amor es suficiente cuando uno no esta bien consigo mismo y yo no lo estaba… y la verdad es que todavia estoy intentando estarlo. Hoy me pesa saber que eras mi lugar seguro y que fui yo quien lo quemo y duele de una forma que no se ni como explicar bien, saber que eras todo lo que queria y aun asi convertirme en mi propio peor enemigo.`;

const textoEl = document.getElementById("texto");
const startBtn = document.getElementById("start");
let i = 0;

startBtn.addEventListener('click', () => {
    startBtn.style.display = "none";
    type();
});

function type(){
    if(i < text.length){
        textoEl.innerHTML += text[i];
        i++;

        // Calcula el scroll para que siempre se vea lo último que se escribe
        // Si el texto supera los 200px de altura, empieza a subir
        const offset = Math.max(0, textoEl.scrollHeight - 200);
        textoEl.style.transform = `translateY(-${offset}px)`;

        setTimeout(type, 45); // Velocidad de escritura
    }else{
        setTimeout(finish, 1500);
    }
}

function finish(){
    document.getElementById("final").style.animation = "showFinal 3s forwards";
    document.getElementById("final").style.bottom = "10%";

    document.querySelector(".carbon").style.transition="3s ease-in";
    document.querySelector(".carbon").style.transform="translateY(0%)";

    if(navigator.vibrate) navigator.vibrate([200,100,500]);
}

// Generador de cenizas ambiente
for(let j=0; j<35; j++){
    const c = document.createElement("div");
    c.className = "ceniza";
    const s = Math.random()*3+1;
    c.style.width = s+"px";
    c.style.height = s+"px";
    c.style.left = Math.random()*100+"vw";
    c.style.animationDuration = (3+Math.random()*6)+"s";
    c.style.animationDelay = Math.random()*5+"s";
    document.body.appendChild(c);
}
</script>
</body>
</html>
